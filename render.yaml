services:
  - type: web
    name: video-anomaly-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: PYTHON_VERSION
        value: 3.10.0
    # Use standard tier for WebSockets to prevent spin-down issues
    plan: starter 
    region: singapore # Adjust as needed
